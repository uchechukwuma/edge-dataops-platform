networks:
  edge_platform_net:
    name: edge_platform_net
    driver: bridge

services:
  emqx:
    image: emqx/emqx:5.0.26
    container_name: emqx_broker
    ports:
      - "1883:1883"
      - "18083:18083"
    networks:
      - edge_platform_net
    healthcheck:
      test: ["CMD", "emqx", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # In your docker-compose.yml, replace your kafka service with this exact configuration
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka_broker
    ports:
      - "9092:9092"
      - "29092:29092"
    networks:
      - edge_platform_net
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'
      KAFKA_CLUSTER_ID: "4L62xdw2RwqN6C7vAjdtQw"
      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka_broker:9092,EXTERNAL://localhost:29092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      KAFKA_LOG_RETENTION_HOURS: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_native_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    # Run as root to avoid permission issues
    user: root

  bridge:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    container_name: mqtt_bridge
    networks:
      - edge_platform_net
    environment:
      MQTT_BROKER: emqx_broker
      KAFKA_BROKER: kafka_broker:9092
    depends_on:
      - emqx
      - kafka
    restart: unless-stopped
    volumes:
      - ./bridge/mqtt_to_kafka.py:/app/mqtt_to_kafka.py

  simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    container_name: sensor_simulator
    networks:
      - edge_platform_net
    environment:
      MQTT_BROKER: emqx_broker
    depends_on:
      - emqx
    restart: unless-stopped
    volumes:
      - ./ingestor/sensor_simulator.py:/app/sensor_simulator.py

  airflow-postgres:
    image: postgres:15-alpine
    container_name: airflow_postgres
    networks:
      - edge_platform_net
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_webserver
    networks:
      - edge_platform_net
    depends_on:
      airflow-postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: "super_secret_edge_platform_key_123"
    volumes:
      - ./dags:/opt/airflow/dags
    command: >
      bash -c "airflow db init &&
               airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com 2>/dev/null || true &&
               airflow webserver"
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: airflow_scheduler
    networks:
      - edge_platform_net
    depends_on:
      airflow-postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__SECRET_KEY: "super_secret_edge_platform_key_123"
    volumes:
      - ./dags:/opt/airflow/dags
    command: "airflow scheduler"
    restart: unless-stopped

volumes:
  kafka_native_data:
    driver: local